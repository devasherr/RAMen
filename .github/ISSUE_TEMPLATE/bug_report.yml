name: Bug Report
description: Report a bug in RAMen
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: RAMen Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start RAMen with ...
        2. Connect with redis-cli ...
        3. Run command ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true